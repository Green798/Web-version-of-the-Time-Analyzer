<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间分析器</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container">
        <header class="text-center my-4">
            <h1 class="app-title">时间分析器</h1>
        </header>

        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>当前时间</span>
                        <span id="current-date-time"></span>
                    </div>
                    <div class="card-body text-center">
                        <div class="clock-container">
                            <div class="clock">
                                <div class="clock-face">
                                    <div class="clock-hour"></div>
                                    <div class="clock-minute"></div>
                                    <div class="clock-second"></div>
                                    <div class="clock-center"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="card">
                    <div class="card-header">
                        <span>选择活动</span>
                    </div>
                    <div class="card-body">
                        <div class="activity-buttons" id="activity-buttons">
                            <!-- 活动按钮将通过JavaScript动态生成 -->
                        </div>
                        <div class="mt-3">
                            <button class="btn btn-outline-secondary btn-sm" id="add-activity-btn">
                                <i class="bi bi-plus-circle"></i> 添加新活动
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="card">
                    <div class="card-header">
                        <span>记录控制</span>
                    </div>
                    <div class="card-body text-center">
                        <div id="record-status" class="mb-3">未开始记录</div>
                        <div class="d-flex justify-content-center">
                            <button id="start-btn" class="btn btn-danger me-3">开始记录</button>
                            <button id="end-btn" class="btn btn-primary" disabled>结束记录</button>
                        </div>
                        <div class="mt-3 text-muted small">
                            <p>使用说明：</p>
                            <ol class="text-start">
                                <li>从上方选择一个活动类型</li>
                                <li>点击"开始记录"按钮开始记录时间</li>
                                <li>完成活动后点击"结束记录"按钮</li>
                                <li>在"分析页面"查看您的时间统计</li>
                            </ol>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="fixed-bottom bg-light py-2">
            <div class="container">
                <div class="row text-center">
                    <div class="col-6">
                        <a href="index.html" class="nav-link active">
                            <i class="bi bi-clock"></i>
                            <div>主页</div>
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="analysis.html" class="nav-link">
                            <i class="bi bi-bar-chart"></i>
                            <div>分析页面</div>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <!-- 添加活动的模态框 -->
    <div class="modal fade" id="add-activity-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加新活动</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="add-activity-form">
                        <div class="mb-3">
                            <label for="activity-name" class="form-label">活动名称</label>
                            <input type="text" class="form-control" id="activity-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="activity-color" class="form-label">活动颜色</label>
                            <input type="color" class="form-control" id="activity-color" value="#3498db">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="save-activity-btn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/clock.js"></script>
</body>
</html>
